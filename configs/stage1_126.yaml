model:
  dino_model: dinov2_vitb14
  dino_block_idx: 2            # 0-indexed → 3rd transformer block
  dino_norm: true              # apply LayerNorm to intermediate output
  sam_checkpoint: /home/defaultuser/checkpoints/sam_vit_h_4b8939.pth
  sam_model_type: vit_h
  align_mode: upsample_student # upsample adapter output to 64×64 for MSE

data:
  manifest: /home/defaultuser/FS-DINO/manifests/sa1b_1k.txt
  image_root: /home/defaultuser/sa1b_images               # set if manifest has relative paths
  train_frac: 0.9
  target_res: 126
  sam_res: 1024
  num_workers: 0
  pin_memory: true

training:
  batch_size: 1
  lr: 1.0e-3
  weight_decay: 0.05
  epochs: 15
  warmup_epochs: 1
  seed: 42
  grad_clip: 1.0
  deterministic: true

output:
  checkpoint_dir: checkpoints/stage1_126
  log_dir: logs/stage1_126
  log_every: 50                # log every N steps
  val_every: 1                 # validate every N epochs
  save_every: 5                # save checkpoint every N epochs
  resume_from: null
